<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음의 온도 (Warmth of Minds) - 확장판</title>
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.94);
            --primary-color: #ff7a00;
            --text-color: #2c3e50;
            --border-radius: 20px;
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(44, 62, 80, 0.35);
            z-index: -1;
        }

        #game-container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 35px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            z-index: 10; /* 표지판 버튼보다 위에 위치하도록 조정 */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 15px;
        }

        .stat-group {
            display: flex;
            gap: 15px;
        }

        .stat {
            font-size: 0.9rem;
            font-weight: 700;
            color: #5d6d7e;
        }

        .stat span {
            color: var(--primary-color);
            font-size: 1.2rem;
            font-weight: 800;
            transition: all 0.3s ease;
        }

        #progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #e0e6ed;
            border-radius: 3px;
            overflow: hidden;
            margin-top: -10px;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            transition: width 0.4s ease;
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #situation-box {
            min-height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: rgba(250, 251, 252, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            padding: 20px;
        }

        #npc-dialogue {
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 600;
            margin: 0;
            word-break: keep-all;
        }

        #choice-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-color);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .choice-btn:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
        }

        .choice-btn:active {
            transform: translateY(0);
        }

        .status-up {
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #2ecc71; }
            100% { transform: scale(1); }
        }

        /* ========================================================
           ✨ 이스터에그: 표지판 이펙트 오버레이 스타일 (한글화)
           ======================================================== */
        #sign-easteregg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            z-index: 100;
            pointer-events: none; /* 클릭 방해 금지 */
            opacity: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #sign-easteregg.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .sign-board {
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 100%);
            border: 4px solid #f5f5f5;
            border-radius: 12px;
            padding: 18px 40px;
            color: white;
            font-family: 'Pretendard', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
            text-align: center;
            position: relative;
        }

        .sign-board::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 20px;
            background-color: #5d4037;
            border-left: 2px solid #f5f5f5;
            border-right: 2px solid #f5f5f5;
        }

        /* 한글 '공감' 카드 스타일 (부드러운 핑크-레드) */
        .empathy-style {
            background: linear-gradient(135deg, #ff7b90 0%, #e91e63 100%) !important;
            box-shadow: 0 0 35px rgba(233, 30, 99, 0.6) !important;
        }

        /* 한글 '예절' 카드 스타일 (싱그러운 그린-에메랄드) */
        .etiquette-style {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%) !important;
            box-shadow: 0 0 35px rgba(39, 174, 96, 0.6) !important;
        }

        /* ========================================================
           👉 일러스트 표지판 터치 영역(Hotspot) 설정 
           ======================================================== */
        .sign-hotspot {
            position: absolute;
            width: 180px;
            height: 140px;
            cursor: pointer;
            z-index: 5;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.01); /* 눈에 보이지 않는 클릭 가이드 영역 */
            transition: transform 0.2s ease;
        }

        .sign-hotspot:hover {
            transform: scale(1.05);
        }

        /* 일러스트 배경의 표지판 위치에 최적화 (반응형 대응) */
        #left-sign-trigger {
            left: calc(50% - 460px);
            bottom: 33%;
        }

        #right-sign-trigger {
            right: calc(50% - 460px);
            bottom: 33%;
        }

        /* 데스크톱 크기가 아닐 때(모바일 등)의 핫스팟 크기 조정 */
        @media (max-width: 1000px) {
            .sign-hotspot {
                width: 100px;
                height: 80px;
            }
            #left-sign-trigger {
                left: 10px;
                bottom: 40%;
            }
            #right-sign-trigger {
                right: 10px;
                bottom: 40%;
            }
        }
    </style>
</head>
<body>

    <!-- 👉 왼쪽 표지판(공감) 클릭용 투명 핫스팟 -->
    <div id="left-sign-trigger" class="sign-hotspot" title="공감 표지판"></div>

    <!-- 👉 오른쪽 표지판(예절) 클릭용 투명 핫스팟 -->
    <div id="right-sign-trigger" class="sign-hotspot" title="예절 표지판"></div>

    <!-- ✨ 이스터에그 표지판 엘리먼트 -->
    <div id="sign-easteregg">
        <div id="sign-text" class="sign-board">공감과 존중</div>
    </div>

    <div id="game-container">
        <header>
            <div class="stat-group">
                <div class="stat">공감 지수: <span id="empathy-score">0</span></div>
                <div class="stat">예절 점수: <span id="etiquette-score">0</span></div>
            </div>
            <div class="stat" style="font-size: 0.85rem;">진행도: <span id="progress-text" style="font-size: 0.95rem; color: #5d6d7e;">1/10</span></div>
        </header>

        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
        
        <main>
            <div id="situation-box">
                <p id="npc-dialogue">로딩 중...</p>
            </div>
            <div id="choice-buttons">
                <!-- 동적 버튼 생성 -->
            </div>
        </main>
    </div>

    <script>
        const scenarios = {
            1: {
                dialogue: "[출근길 지하철] 만원 지하철 안, 무거운 백팩을 멘 승객이 당신을 밀치며 지나갔지만 사과가 없습니다. 당신의 반응은?",
                choices: [
                    { text: "상대방의 어깨를 살짝 탭하며 '가방이 걸렸으니 조금만 조심해주세요'라고 차분히 말한다.", empathy: 10, etiquette: 20, next: 2 },
                    { text: "불쾌하지만 복잡한 출근길이니 넓은 마음으로 한 걸음 물러나 공간을 양보한다.", empathy: 20, etiquette: 10, next: 2 },
                    { text: "일부러 똑같이 어깨로 밀치며 차가운 눈빛으로 째려본다.", empathy: -10, etiquette: -15, next: 2 }
                ]
            },
            2: {
                dialogue: "[카페 주문] 바쁜 아침, 카페 알바생이 실수를 연달아 하며 허둥대고 있어 대기 줄이 길어집니다.",
                choices: [
                    { text: "차례가 왔을 때 '천천히 하셔도 괜찮아요'라고 미소와 함께 따뜻하게 말해준다.", empathy: 20, etiquette: 15, next: 3 },
                    { text: "아무 말 없이 조용히 순서를 기다리며 예의를 지킨다.", empathy: 10, etiquette: 10, next: 3 },
                    { text: "한숨을 크게 쉬고 시계를 확인하며 소리 나게 핀잔을 준다.", empathy: -15, etiquette: -15, next: 3 }
                ]
            },
            3: {
                dialogue: "[사무실 오전] 동료가 오늘따라 실수가 많고 눈이 충혈되어 힘들어 보입니다. 중요한 기획안 작성을 앞두고 있습니다.",
                choices: [
                    { text: "음료를 건네며 '요즘 피곤해 보여요, 제가 도울 수 있는 부분이 있다면 말씀하세요'라고 조심스레 묻는다.", empathy: 25, etiquette: 10, next: 4 },
                    { text: "개인 사생활일 수 있으니 방해하지 않고 묵묵히 제 몫의 업무에 집중한다.", empathy: 5, etiquette: 10, next: 4 },
                    { text: "'오늘 왜 이렇게 실수가 많아요? 집중 좀 하시죠'라며 따진다.", empathy: -20, etiquette: -10, next: 4 }
                ]
            },
            4: {
                dialogue: "[단톡방 오해] 프로젝트 그룹 단톡방에서 다른 부서 동료가 나의 의견을 오해해 다소 공격적인 메시지를 보냈습니다.",
                choices: [
                    { text: "그 사람의 메신저로 개인 전화를 걸어 '혹시 어떤 점이 불편하셨는지 나누고 싶다'며 정중히 설득한다.", empathy: 15, etiquette: 20, next: 5 },
                    { text: "단톡방에서 '제가 드린 말씀은 이런 뜻이었습니다'라고 정중하고 논리적인 텍스트로 오해를 차분히 푼다.", empathy: 10, etiquette: 15, next: 5 },
                    { text: "단톡방에서 즉시 똑같이 날 선 어조로 비아냥거리는 답장을 보낸다.", empathy: -15, etiquette: -20, next: 5 }
                ]
            },
            5: {
                dialogue: "[회의실 예절] 열띤 회의 중, 후배 직원이 다소 미숙하지만 번뜩이는 새 아이디어를 냈으나 선배들이 묵살하려 합니다.",
                choices: [
                    { text: "'방금 말씀하신 아이디어 중 이 부분은 구체화하면 좋을 것 같습니다'라며 의견을 지지해준다.", empathy: 20, etiquette: 15, next: 6 },
                    { text: "회의의 질서와 기존 선배들의 의견을 고려해 일단 경청한 뒤 회의가 끝난 후 따로 후배를 격려한다.", empathy: 15, etiquette: 15, next: 6 },
                    { text: "선배들의 눈치를 보며 후배의 의견이 허무맹랑하다고 같이 깎아내린다.", empathy: -15, etiquette: -10, next: 6 }
                ]
            },
            6: {
                dialogue: "[점심 시간] 식당에서 서빙하시는 이모님이 밑반찬을 쏟는 실수를 하셨습니다. 당신의 행동은?",
                choices: [
                    { text: "'아이고, 다치지 않으셨어요? 저희가 치울게요'라며 먼저 안심시켜 드린다.", empathy: 25, etiquette: 15, next: 7 },
                    { text: "조용히 냅킨을 들어 쏟아진 반찬과 테이블을 함께 닦는 것을 돕는다.", empathy: 15, etiquette: 15, next: 7 },
                    { text: "서비스가 엉망이라며 사장님을 부르거나 인상을 팍 찌푸린다.", empathy: -15, etiquette: -15, next: 7 }
                ]
            },
            7: {
                dialogue: "[거절의 예절] 거절하기 곤란한 지인의 급작스러운 저녁 술자리 제안이 왔습니다. 오늘 밤엔 꼭 쉬고 싶습니다.",
                choices: [
                    { text: "'초대해 줘서 정말 고마워요. 하지만 오늘은 개인적인 휴식이 꼭 필요해서 아쉽게도 다음 기회에 꼭 함께해요'라고 마음을 표현한다.", empathy: 15, etiquette: 25, next: 8 },
                    { text: "읽고 답장을 미루다가 늦은 밤에 '미안, 이제 봤어'라며 대충 둘러댄다.", empathy: -5, etiquette: -5, next: 8 },
                    { text: "귀찮아서 아무 답장도 하지 않고 메시지를 무시한다(읽씹).", empathy: -15, etiquette: -20, next: 8 }
                ]
            },
            8: {
                dialogue: "[엘리베이터] 엘리베이터 문이 닫히려는 순간, 멀리서 양손 가득 짐을 든 이웃이 뛰어오는 것이 보입니다.",
                choices: [
                    { text: "열림 버튼을 꾹 누르고 인사를 건네며 들어오기 편하도록 비켜선다.", empathy: 15, etiquette: 20, next: 9 },
                    { text: "못 본 척 가만히 있거나 빨리 닫힘 버튼을 연타한다.", empathy: -15, etiquette: -15, next: 9 }
                ]
            },
            9: {
                dialogue: "[운전 및 보행] 비 오는 날 횡단보도를 건너려는데, 고여 있는 빗물 근처를 지나는 보행자가 보입니다. 당신이 운전자라면?",
                choices: [
                    { text: "속도를 아주 느리게 낮춰 물이 튀지 않도록 서행해서 조심히 지나간다.", empathy: 20, etiquette: 20, next: 10 },
                    { text: "미처 발견하지 못해 평소 속도로 지나치며 뒤늦게 속으로 사과한다.", empathy: 0, etiquette: 5, next: 10 },
                    { text: "보행자가 있든 말든 신경 쓰지 않고 쌩하며 빠르게 액셀을 밟는다.", empathy: -20, etiquette: -20, next: 10 }
                ]
            },
            10: {
                dialogue: "[퇴근 길 아파트] 아파트 층간소음 문제로 아랫집 이웃이 초인종을 정중하게 눌렀습니다. 오늘 아이들이 좀 뛰어놀긴 했습니다.",
                choices: [
                    { text: "'아이고, 정말 죄송합니다. 오늘 저희가 주의를 기울이지 못했네요. 조심시키겠습니다'라며 진심을 다해 사과한다.", empathy: 20, etiquette: 25, next: 'ending' },
                    { text: "'낮 시간인데 조금은 이해해 주셔야 하는 것 아닌가요?'라며 방어적인 태도를 보인다.", empathy: -10, etiquette: -15, next: 'ending' }
                ]
            }
        };

        class HeartEngine {
            constructor() {
                this.empathy = 0;
                this.etiquette = 0;
                this.currentStep = 1;
                this.totalSteps = 10;

                this.dialogueEl = document.getElementById('npc-dialogue');
                this.choicesEl = document.getElementById('choice-buttons');
                this.empathyEl = document.getElementById('empathy-score');
                this.etiquetteEl = document.getElementById('etiquette-score');
                this.progressTextEl = document.getElementById('progress-text');
                this.progressBarEl = document.getElementById('progress-bar');

                // 이스터에그 및 트리거 엘리먼트 캐싱
                this.easterEggEl = document.getElementById('sign-easteregg');
                this.signTextEl = document.getElementById('sign-text');
                this.leftTrigger = document.getElementById('left-sign-trigger');
                this.rightTrigger = document.getElementById('right-sign-trigger');
            }

            init() {
                this.render();
                this.bindEasterEggTriggers();
            }

            render() {
                if (this.currentStep === 'ending') {
                    this.showEndingEvaluation();
                    return;
                }

                const currentScenario = scenarios[this.currentStep];
                this.dialogueEl.textContent = currentScenario.dialogue;
                this.choicesEl.innerHTML = '';

                this.progressTextEl.textContent = `${this.currentStep} / ${this.totalSteps}`;
                const progressPercent = (this.currentStep / this.totalSteps) * 100;
                this.progressBarEl.style.width = `${progressPercent}%`;

                this.updateScoreUI(this.empathyEl, this.empathy);
                this.updateScoreUI(this.etiquetteEl, this.etiquette);

                currentScenario.choices.forEach(choice => {
                    const button = document.createElement('button');
                    button.className = 'choice-btn';
                    button.textContent = choice.text;
                    button.addEventListener('click', () => this.nextStep(choice));
                    this.choicesEl.appendChild(button);
                });
            }

            updateScoreUI(element, value) {
                if (parseInt(element.textContent) !== value) {
                    element.textContent = value;
                    element.classList.add('status-up');
                    setTimeout(() => element.classList.remove('status-up'), 500);
                }
            }

            // 👉 실제 일러스트 표지판 클릭 이벤트 바인딩
            bindEasterEggTriggers() {
                // 왼쪽 표지판 클릭 -> '공감과 존중' 팝업
                this.leftTrigger.addEventListener('click', () => {
                    this.showManualEasterEgg("공감과 존중", "empathy-style");
                });

                // 오른쪽 표지판 클릭 -> '예의와 조화' 팝업
                this.rightTrigger.addEventListener('click', () => {
                    this.showManualEasterEgg("예의와 조화", "etiquette-style");
                });
            }

            // 직접 터치/클릭을 통해 명시적으로 띄우는 이스터에그 컨트롤러
            showManualEasterEgg(text, styleClass) {
                this.signTextEl.className = 'sign-board';
                this.signTextEl.textContent = text;
                this.signTextEl.classList.add(styleClass);

                this.easterEggEl.classList.add('show');
                
                // 수동 터치시 효과를 좀 더 누릴 수 있도록 1.2초 후 종료
                setTimeout(() => {
                    this.easterEggEl.classList.remove('show');
                }, 1200);
            }

            // 선택지 스코어링 시스템 연동 이스터에그
            triggerEasterEgg(choice) {
                if (choice.empathy <= 0 && choice.etiquette <= 0) return;

                this.signTextEl.className = 'sign-board';

                if (choice.empathy >= choice.etiquette) {
                    this.signTextEl.textContent = "공감과 존중";
                    this.signTextEl.classList.add('empathy-style');
                } else {
                    this.signTextEl.textContent = "예의와 조화";
                    this.signTextEl.classList.add('etiquette-style');
                }

                this.easterEggEl.classList.add('show');

                setTimeout(() => {
                    this.easterEggEl.classList.remove('show');
                }, 1000);
            }

            nextStep(choice) {
                this.triggerEasterEgg(choice);

                this.empathy += choice.empathy;
                this.etiquette += choice.etiquette;
                this.currentStep = choice.next;

                setTimeout(() => {
                    this.render();
                }, 400);
            }

            showEndingEvaluation() {
                const total = this.empathy + this.etiquette;
                let title = "";
                let evaluation = "";
                let bgGradient = "";

                if (total >= 280) {
                    title = "따뜻함이 가득한 '인간 보일러' 🌡️ (온도 100°C)";
                    evaluation = "당신은 배려와 공감이 몸에 밴 완벽한 예절가입니다. 복잡하고 각박한 사회 속에서도 주변 동료와 타인의 슬픔, 당황스러움을 그냥 지나치지 않는 성숙한 리더십을 갖추고 계시는군요. 선배님이 계신 조직은 언제나 봄날처럼 따뜻할 것입니다.";
                    bgGradient = "#fff5eb";
                } else if (total >= 150) {
                    title = "훈훈한 온기를 품은 '벽난로' 🔥 (온도 36.5°C)";
                    evaluation = "타인의 상황을 깊이 이해하려 노력하며 사회적인 예의범절을 아주 잘 지키는 선량하고 성실한 분입니다. 현실과 타협하는 부득이한 선택 속에서도 늘 조심성을 잃지 않으려 신경 쓰는 균형 잡힌 인격을 보여주십니다.";
                    bgGradient = "#f6fbf7";
                } else if (total >= 50) {
                    title = "가끔 식어버리는 '온수매트' 🔌 (온도 20°C)";
                    evaluation = "악의는 전혀 없지만, 바쁜 일상과 스트레스로 가끔 마음의 여유가 부족해지면 본의 아니게 타인에게 무감각해지거나 쌀쌀맞은 태도를 취하게 됩니다. 조금만 더 한 박자 쉬고 타인을 생각하는 여유를 가질 수 있다면 좋겠습니다.";
                    bgGradient = "#fbf6f6";
                } else {
                    title = "냉정하고 합리적인 '냉장고' 🧊 (온도 0°C)";
                    evaluation = "규칙에 너무 얽매이거나 감정 소모를 철저히 차단하는 냉소적인 면모가 강합니다. 예절을 지키기보단 효율적인 마무리를 원하셨을 수도 있지만, 사람들의 마음에 작은 온기를 불어넣는 말 한마디가 때로는 모든 문제를 해결하는 열쇠가 됨을 상기해 주세요.";
                    bgGradient = "#f0f4f8";
                }

                document.body.style.backgroundColor = bgGradient;

                this.dialogueEl.innerHTML = `<strong style="font-size: 1.3rem; color: var(--primary-color);">${title}</strong><br><br><span style="font-size: 0.95rem; font-weight: normal; line-height: 1.6; display:block; text-align: left; margin-top: 10px; color: #4a5568;">${evaluation}</span>`;
                this.choicesEl.innerHTML = '';

                this.progressTextEl.textContent = "종료";
                this.progressBarEl.style.width = "100%";

                const restartBtn = document.createElement('button');
                restartBtn.className = 'choice-btn';
                restartBtn.style.textAlign = 'center';
                restartBtn.textContent = '🔄 처음부터 다시 도전하여 따뜻한 내일 만들기';
                restartBtn.addEventListener('click', () => {
                    this.empathy = 0;
                    this.etiquette = 0;
                    this.currentStep = 1;
                    document.body.style.backgroundColor = 'var(--bg-color)';
                    this.render();
                });
                this.choicesEl.appendChild(restartBtn);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const game = new HeartEngine();
            game.init();
        });
    </script>
</body>
</html>
